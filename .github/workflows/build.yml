# Automatically builds the mod every time you push a change to GitHub.
# You do not need to install anything locally to use this - GitHub runs
# the build on their own computer. Download the finished .jar from the
# "Actions" tab of your repository, inside the artifact named "Artifacts".

name: build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: setup jdk 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
